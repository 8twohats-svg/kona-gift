<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONA BIZ - 통합 어드민 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F4F5F8; margin: 0; }
        .bg-kona-dark { background-color: #121F3D; } 
        
        .input-kona { border: 1px solid #d1d5db; padding: 0.4rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; color: #374151; outline: none; width: 100%; transition: border-color 0.2s; }
        .input-kona:focus { border-color: #1636d6; }
        .btn-outline { border: 1px solid #d1d5db; background-color: #fff; color: #374151; padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.75rem; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; justify-content: center;}
        
        .kona-table th { background-color: #121F3D; color: #ffffff; font-weight: 500; font-size: 0.75rem; padding: 0.75rem 0.5rem; text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 10; border-right: 1px solid #2a3754; }
        .kona-table td { border-bottom: 1px solid #e5e7eb; font-size: 0.75rem; padding: 0.75rem 0.5rem; text-align: center; color: #4b5563; white-space: nowrap; background-color: #fff; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        .nav-item { transition: all 0.2s ease; border-left: 3px solid transparent; }
        .nav-item.active { background-color: rgba(255,255,255,0.1); color: white !important; border-left: 3px solid white; font-weight: bold; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <aside class="w-56 bg-kona-dark text-white flex flex-col shrink-0 overflow-y-auto">
        <div class="h-16 flex items-center px-6 font-bold text-xl tracking-wider border-b border-gray-700 shrink-0 cursor-pointer" onclick="location.reload()">KONA BIZ</div>
        
        <nav class="flex-1 py-4 text-[13px] font-medium space-y-1 pb-10">
            <div id="nav-dashboard" onclick="loadPage('dashboard.html', 'nav-dashboard')" class="px-6 py-3 opacity-60 cursor-pointer flex items-center gap-2 hover:opacity-100 hover:bg-white/5 transition"><span>📊</span> 대시보드</div>
            
            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>🎁</span> 기프트카드 관리</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-sales" onclick="loadPage('sales.html', 'nav-sales')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">판매 관리</div>
                <div id="nav-buyer" onclick="loadPage('buyer.html', 'nav-buyer')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">구매자 관리</div>
            </div>

            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>🏢</span> 조직관리</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-employee" onclick="loadPage('employee.html', 'nav-employee')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">임직원 관리</div>
            </div>

            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>💳</span> 카드 관리</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-op-product" onclick="loadPage('op-product.html', 'nav-op-product')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">운영 상품</div>
                <div id="nav-welfare-card" onclick="loadPage('welfare-card.html', 'nav-welfare-card')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">복지 카드 관리</div>
                <div id="nav-card-order" onclick="loadPage('card-order.html', 'nav-card-order')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">카드 주문 관리</div>
            </div>
            
            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>💰</span> 지급/회수</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-pay-ret" onclick="loadPage('pay-ret.html', 'nav-pay-ret')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">지급/회수 관리</div>
            </div>

            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>📋</span> 이용 관리</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-usage" onclick="loadPage('usage.html', 'nav-usage')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">카드 이용 내역</div>
            </div>

            <div class="px-6 py-3 bg-white/5 flex justify-between items-center mt-1 text-gray-400"><div class="flex items-center gap-2"><span>🏢</span> 기업정보</div><span class="text-[10px]">▼</span></div>
            <div class="bg-[#0B132B] py-1">
                <div id="nav-corporate" onclick="loadPage('corporate.html', 'nav-corporate')" class="nav-item px-10 py-2 text-gray-400 hover:text-white cursor-pointer transition">기업 정보</div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-12 border-b flex items-center justify-end px-6 gap-3 shadow-sm bg-white shrink-0 z-10">
            <div class="flex items-center gap-1 text-red-500 border border-red-200 rounded-full px-2 py-1 bg-red-50 text-xs font-bold">⏱ 29:58 연장</div>
            <div class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-full text-xs font-bold cursor-pointer hover:bg-gray-200">👤 홍*우 ⚙️</div>
            <button class="text-xs text-gray-400 font-bold ml-2 hover:text-black">로그아웃</button>
        </header>

        <div id="main-content" class="flex-1 overflow-hidden flex flex-col relative bg-[#F5F6F8]"></div>
    </main>

    <script>
        /**
         * 페이지 동적 로드 및 스크립트 강제 실행 함수
         */
        async function loadPage(pageUrl, navId) {
            try {
                // 1. 모든 메뉴 스타일 초기화
                document.querySelectorAll('.nav-item, #nav-dashboard').forEach(el => {
                    el.classList.remove('active', 'text-white', 'font-bold', 'opacity-100');
                    if(el.id !== 'nav-dashboard') el.classList.add('text-gray-400');
                });
                
                // 2. 선택된 메뉴 하이라이트 활성화
                const targetNav = document.getElementById(navId);
                if(targetNav) {
                    if(navId === 'nav-dashboard') {
                        targetNav.classList.add('opacity-100', 'font-bold', 'text-white');
                    } else {
                        targetNav.classList.add('active');
                    }
                }

                // 3. 파일 비동기 호출
                const response = await fetch(pageUrl);
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                const html = await response.text();
                
                // 4. 메인 컨텐츠 영역 교체
                const mainContent = document.getElementById('main-content');
                mainContent.innerHTML = html;

                // 5. [중요] 삽입된 HTML 내의 script 태그를 재생성하여 강제 실행
                const scripts = mainContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    // 기존 script의 모든 속성 복사 (src 등)
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    // 내부 코드 복사
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    // 교체 및 실행
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

            } catch (error) {
                console.error('페이지 로딩 에러:', error);
                document.getElementById('main-content').innerHTML = `
                    <div class="flex items-center justify-center h-full flex-col gap-4">
                        <div class="text-6xl">🚧</div>
                        <div class="text-gray-500 font-bold text-xl">[${pageUrl}] 로드 실패</div>
                        <div class="text-gray-400 text-sm">해당 파일이 작업 폴더에 존재하는지 확인해주세요.</div>
                    </div>`;
            }
        }

        // 브라우저 로딩 시 첫 화면 설정
        window.onload = () => { 
            loadPage('dashboard.html', 'nav-dashboard'); 
        };
    </script>
</body>
</html>
