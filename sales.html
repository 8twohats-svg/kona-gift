<div id="view-sales-list" class="flex-1 overflow-y-auto p-6 flex flex-col w-full h-full animate-fade-in bg-[#F4F5F8]">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold text-gray-900">판매 관리</h1>
        <div class="flex gap-2">
            <button onclick="handleTopBtn('charge')" class="bg-white border border-blue-400 text-blue-600 px-4 py-1.5 rounded-full text-[13px] font-bold shadow-sm hover:bg-blue-50 transition">기존 카드 충전</button>
            <button onclick="handleTopBtn('order')" class="bg-white border border-blue-400 text-blue-600 px-4 py-1.5 rounded-full text-[13px] font-bold shadow-sm hover:bg-blue-50 transition">고객 카드 주문</button>
            <button onclick="handleTopBtn('policy')" class="bg-[#121F3D] text-white px-5 py-1.5 rounded-full text-[13px] font-bold shadow-sm hover:bg-black transition">⚙️ 판매 정책 관리</button>
        </div>
    </div>
    
    <div class="bg-white border border-gray-200 shadow-sm w-full flex-1 relative rounded-lg overflow-hidden">
        <div class="custom-scrollbar w-full h-full overflow-y-auto">
            <table class="w-full text-center text-xs kona-table">
                <thead class="bg-gray-50 sticky top-0 z-10">
                    <tr>
                        <th class="w-12 py-3 border-b">NO</th>
                        <th class="border-b">주문번호</th>
                        <th class="border-b">등록일시</th>
                        <th class="border-b">구매자명</th>
                        <th class="border-b text-left pl-6">상품명 (권종)</th>
                        <th class="border-b text-right pr-6">총 결제금액</th>
                        <th class="border-b">진행상태</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700 bg-white">
                    <tr class="hover:bg-blue-50 cursor-pointer border-b" onclick="showSalesDetail('202602241', '홍길동', '결제완료 (매핑대기)', '200,000', '2026/02/24 16:05:14')">
                        <td class="py-4">1</td>
                        <td class="font-mono text-blue-600 font-bold underline">202602241</td>
                        <td>2026/03/12 10:20:44</td>
                        <td class="font-bold">홍길동</td>
                        <td class="text-left pl-6">더한옥헤리티지하우스 상품권 (200,000원)</td>
                        <td class="text-right pr-6 font-bold text-gray-900">200,000</td>
                        <td><span class="bg-red-50 text-red-500 border border-red-200 px-2 py-0.5 rounded text-[10px] font-bold">매핑대기</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="view-sales-detail" class="flex-1 overflow-y-auto p-8 hidden flex-col w-full h-full animate-fade-in bg-[#F4F5F8]">
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <button onclick="switchSalesView('view-sales-list')" class="text-gray-400 hover:text-black text-2xl transition">←</button>
            <h1 class="text-xl font-bold text-gray-900">판매 상세 내역</h1>
        </div>
        <div class="flex gap-2">
            <button class="bg-[#121F3D] text-white px-6 py-2 rounded-full text-[13px] font-bold shadow-md hover:bg-black transition">결제 정보 전송</button>
            <button class="bg-white border border-gray-300 text-gray-800 px-6 py-2 rounded-full text-[13px] font-bold shadow-sm hover:bg-gray-50 transition" onclick="switchSalesView('view-sales-list')">목록</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <h3 class="text-[14px] font-bold text-gray-700 mb-2">- 지급 대상 카드 매핑</h3>
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <table class="w-full text-center text-xs">
                <thead class="bg-[#121F3D] text-white">
                    <tr>
                        <th class="py-3.5 w-16">NO</th>
                        <th class="py-3.5 text-left pl-10">상품명 (권종)</th>
                        <th class="py-3.5 w-60">카드번호 매핑</th>
                        <th class="py-3.5 w-40 pr-10 text-right">금액(원)</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700" id="dtl_mapping_body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="mappingPopup" class="fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center hidden">
    <div class="bg-white rounded-lg shadow-xl w-[450px] overflow-hidden">
        <div class="bg-[#121F3D] p-4 flex justify-between items-center text-white">
            <span class="font-bold">재고 카드 선택</span>
            <button onclick="closeMappingPopup()" class="text-2xl">&times;</button>
        </div>
        <div class="p-5">
            <div class="max-h-60 overflow-y-auto border rounded mb-4">
                <table class="w-full text-xs text-center">
                    <tbody id="cardListBody">
                        <tr class="hover:bg-blue-50 cursor-pointer border-b" onclick="selectCardNum('9440-1000-2222-3333')">
                            <td class="p-3 font-mono">9440-1000-2222-3333</td>
                            <td class="p-3 text-green-600 font-bold italic">재고있음</td>
                        </tr>
                        <tr class="hover:bg-blue-50 cursor-pointer border-b" onclick="selectCardNum('9440-1000-4444-5555')">
                            <td class="p-3 font-mono">9440-1000-4444-5555</td>
                            <td class="p-3 text-green-600 font-bold italic">재고있음</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button onclick="closeMappingPopup()" class="w-full bg-gray-200 py-2 rounded font-bold text-gray-700">닫기</button>
        </div>
    </div>
</div>

<script>
    let currentMappingIdx = null;

    // 1. 화면 전환 로직
    function switchSalesView(viewId) {
        document.getElementById('view-sales-list').classList.add('hidden');
        document.getElementById('view-sales-detail').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
        document.getElementById(viewId).classList.add('flex');
    }

    // 2. 상단 버튼 통합 관리
    function handleTopBtn(type) {
        if(type === 'policy') {
            alert('판매 정책 관리 화면으로 이동합니다.');
            // loadPage('policy.html', 'nav-sales'); // 나중에 실제 파일 연결 시 사용
        } else if(type === 'charge') {
            alert('기존 카드 충전 팝업을 실행합니다.');
        } else if(type === 'order') {
            alert('고객 카드 주문 화면으로 이동합니다.');
        }
    }

    // 3. 상세 화면 및 카드 매핑 동적 생성
    function showSalesDetail(id, name, status, price, date) {
        const mappingBody = document.getElementById('dtl_mapping_body');
        mappingBody.innerHTML = `
            <tr class="border-b border-gray-100">
                <td class="py-5 text-gray-400">1</td>
                <td class="text-left pl-10 font-bold">더한옥헤리티지하우스 상품권 (200,000원)</td>
                <td id="cell_card_1">
                    <button onclick="openMappingPopup(1)" class="border border-blue-400 text-blue-600 px-4 py-1.5 rounded-full text-[11px] font-bold bg-blue-50">재고 카드 매핑하기</button>
                </td>
                <td class="font-bold text-gray-900 pr-10 text-right">200,000</td>
            </tr>
        `;
        switchSalesView('view-sales-detail');
    }

    // 4. 카드 매핑 팝업 로직
    function openMappingPopup(idx) {
        currentMappingIdx = idx;
        document.getElementById('mappingPopup').classList.remove('hidden');
    }

    function closeMappingPopup() {
        document.getElementById('mappingPopup').classList.add('hidden');
    }

    function selectCardNum(num) {
        const cell = document.getElementById(`cell_card_${currentMappingIdx}`);
        cell.innerHTML = `<span class="text-blue-700 font-mono font-bold font-lg">${num}</span>`;
        closeMappingPopup();
    }
</script>
